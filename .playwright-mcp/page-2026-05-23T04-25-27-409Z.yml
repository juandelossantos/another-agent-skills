            - separator [ref=e323]
            - heading "Configure" [level=2] [ref=e324]:
              - link "Configure" [ref=e325]:
                - /url: "#configure"
            - paragraph [ref=e326]: With OpenCode you can use any LLM provider by configuring their API keys.
            - paragraph [ref=e327]:
              - text: If you are new to using LLM providers, we recommend using
              - link "OpenCode Zen" [ref=e328] [cursor=pointer]:
                - /url: /docs/zen
              - text: . It’s a curated list of models that have been tested and verified by the OpenCode team.
            - list [ref=e329]:
              - listitem [ref=e330]:
                - paragraph [ref=e331]:
                  - text: Run the
                  - code [ref=e332]: "`/connect`"
                  - text: command in the TUI, select opencode, and head to
                  - link "opencode.ai/auth" [ref=e333] [cursor=pointer]:
                    - /url: https://opencode.ai/auth
                  - text: .
                - figure [ref=e335]:
                  - code [ref=e337]:
                    - generic [ref=e339]: /connect
                  - button "Copy to clipboard" [ref=e341] [cursor=pointer]
              - listitem [ref=e343]:
                - paragraph [ref=e344]: Sign in, add your billing details, and copy your API key.
              - listitem [ref=e345]:
                - paragraph [ref=e346]: Paste your API key.
                - figure [ref=e348]:
                  - code [ref=e350]:
                    - generic [ref=e352]: ┌ API key
                    - generic [ref=e354]: │
                    - generic [ref=e356]: │
                    - generic [ref=e358]: └ enter
                  - button "Copy to clipboard" [ref=e360] [cursor=pointer]
            - paragraph [ref=e362]:
              - text: Alternatively, you can select one of the other providers.
              - link "Learn more" [ref=e363] [cursor=pointer]:
                - /url: /docs/providers#directory
              - text: .
            - separator [ref=e364]
            - heading "Initialize" [level=2] [ref=e365]:
              - link "Initialize" [ref=e366]:
                - /url: "#initialize"
            - paragraph [ref=e367]: Now that you’ve configured a provider, you can navigate to a project that you want to work on.
            - figure "Terminal window" [ref=e369]:
              - generic [ref=e372]: Terminal window
              - code [ref=e374]:
                - generic [ref=e376]: cd /path/to/project
              - button "Copy to clipboard" [ref=e378] [cursor=pointer]
            - paragraph [ref=e380]: And run OpenCode.
            - figure "Terminal window" [ref=e382]:
              - generic [ref=e385]: Terminal window
              - code [ref=e387]:
                - generic [ref=e389]: opencode
              - button "Copy to clipboard" [ref=e391] [cursor=pointer]
            - paragraph [ref=e393]: Next, initialize OpenCode for the project by running the following command.
            - figure [ref=e395]:
              - code [ref=e397]:
                - generic [ref=e399]: /init
              - button "Copy to clipboard" [ref=e401] [cursor=pointer]
            - paragraph [ref=e403]:
              - text: This will get OpenCode to analyze your project and create an
              - code [ref=e404]: "`AGENTS.md`"
              - text: file in the project root.
            - complementary "Tip" [ref=e405]:
              - paragraph [ref=e406]:
                - img [ref=e407]
                - text: Tip
              - paragraph [ref=e411]:
                - text: You should commit your project’s
                - code [ref=e412]: "`AGENTS.md`"
                - text: file to Git.
            - paragraph [ref=e413]: This helps OpenCode understand the project structure and the coding patterns used.
            - separator [ref=e414]
            - heading "Usage" [level=2] [ref=e415]:
              - link "Usage" [ref=e416]:
                - /url: "#usage"
            - paragraph [ref=e417]: You are now ready to use OpenCode to work on your project. Feel free to ask it anything!
            - paragraph [ref=e418]: If you are new to using an AI coding agent, here are some examples that might help.
            - separator [ref=e419]
            - heading "Ask questions" [level=3] [ref=e420]:
              - link "Ask questions" [ref=e421]:
                - /url: "#ask-questions"
            - paragraph [ref=e422]: You can ask OpenCode to explain the codebase to you.
            - complementary "Tip" [ref=e423]:
              - paragraph [ref=e424]:
                - img [ref=e425]
                - text: Tip
              - paragraph [ref=e429]:
                - text: Use the
                - code [ref=e430]: "`@`"
                - text: key to fuzzy search for files in the project.
            - figure [ref=e432]:
              - region [ref=e433]:
                - code [ref=e434]:
                  - generic [ref=e436]:
                    - text: How is authentication handled in
                    - mark [ref=e437]: "@packages/functions/src/api/index.ts"
              - button "Copy to clipboard" [ref=e439] [cursor=pointer]
            - paragraph [ref=e441]: This is helpful if there’s a part of the codebase that you didn’t work on.
            - separator [ref=e442]
            - heading "Add features" [level=3] [ref=e443]:
              - link "Add features" [ref=e444]:
                - /url: "#add-features"
            - paragraph [ref=e445]: You can ask OpenCode to add new features to your project. Though we first recommend asking it to create a plan.
            - list [ref=e446]:
              - listitem [ref=e447]:
                - paragraph [ref=e448]:
                  - strong [ref=e449]: Create a plan
                - paragraph [ref=e450]:
                  - text: OpenCode has a
                  - emphasis [ref=e451]: Plan mode
                  - text: that disables its ability to make changes and instead suggest
                  - emphasis [ref=e452]: how
                  - text: it’ll implement the feature.
                - paragraph [ref=e453]:
                  - text: Switch to it using the
                  - strong [ref=e454]: Tab
                  - text: key. You’ll see an indicator for this in the lower right corner.
                - figure [ref=e456]:
                  - code [ref=e458]:
                    - generic [ref=e460]: <TAB>
                  - button "Copy to clipboard" [ref=e462] [cursor=pointer]
                - paragraph [ref=e464]: Now let’s describe what we want it to do.
                - figure [ref=e466]:
                  - region [ref=e467]:
                    - code [ref=e468]:
                      - generic [ref=e470]: When a user deletes a note, we'd like to flag it as deleted in the database.
                      - generic [ref=e472]: Then create a screen that shows all the recently deleted notes.
                      - generic [ref=e474]: From this screen, the user can undelete a note or permanently delete it.
                  - button "Copy to clipboard" [ref=e476] [cursor=pointer]
                - paragraph [ref=e478]: You want to give OpenCode enough details to understand what you want. It helps to talk to it like you are talking to a junior developer on your team.
                - complementary "Tip" [ref=e479]:
                  - paragraph [ref=e480]:
                    - img [ref=e481]
                    - text: Tip
                  - paragraph [ref=e485]: Give OpenCode plenty of context and examples to help it understand what you want.
              - listitem [ref=e486]:
                - paragraph [ref=e487]:
                  - strong [ref=e488]: Iterate on the plan
                - paragraph [ref=e489]: Once it gives you a plan, you can give it feedback or add more details.
                - figure [ref=e491]:
                  - region [ref=e492]:
                    - code [ref=e493]:
                      - generic [ref=e495]: We'd like to design this new screen using a design I've used before.
                      - generic [ref=e497]: "[Image #1] Take a look at this image and use it as a reference."
                  - button "Copy to clipboard" [ref=e499] [cursor=pointer]
                - complementary "Tip" [ref=e501]:
                  - paragraph [ref=e502]:
                    - img [ref=e503]
                    - text: Tip
                  - paragraph [ref=e507]: Drag and drop images into the terminal to add them to the prompt.
                - paragraph [ref=e508]: OpenCode can scan any images you give it and add them to the prompt. You can do this by dragging and dropping an image into the terminal.
              - listitem [ref=e509]:
                - paragraph [ref=e510]:
                  - strong [ref=e511]: Build the feature
                - paragraph [ref=e512]:
                  - text: Once you feel comfortable with the plan, switch back to
                  - emphasis [ref=e513]: Build mode
                  - text: by hitting the
                  - strong [ref=e514]: Tab
                  - text: key again.
                - figure [ref=e516]:
                  - code [ref=e518]:
                    - generic [ref=e520]: <TAB>
                  - button "Copy to clipboard" [ref=e522] [cursor=pointer]
                - paragraph [ref=e524]: And asking it to make the changes.
                - figure [ref=e526]:
                  - code [ref=e528]:
                    - generic [ref=e530]: Sounds good! Go ahead and make the changes.
                  - button "Copy to clipboard" [ref=e532] [cursor=pointer]
            - separator [ref=e534]
            - heading "Make changes" [level=3] [ref=e535]:
              - link "Make changes" [ref=e536]:
                - /url: "#make-changes"
            - paragraph [ref=e537]: For more straightforward changes, you can ask OpenCode to directly build it without having to review the plan first.
            - figure [ref=e539]:
              - region [ref=e540]:
                - code [ref=e541]:
                  - generic [ref=e543]: We need to add authentication to the /settings route. Take a look at how this is
                  - generic [ref=e545]:
                    - text: handled in the /notes route in
                    - mark [ref=e546]: "@packages/functions/src/notes.ts"
                    - text: and implement
                  - generic [ref=e548]:
                    - text: the same logic in
                    - mark [ref=e549]: "@packages/functions/src/settings.ts"
              - button "Copy to clipboard" [ref=e551] [cursor=pointer]
            - paragraph [ref=e553]: You want to make sure you provide a good amount of detail so OpenCode makes the right changes.
            - separator [ref=e554]
            - heading "Undo changes" [level=3] [ref=e555]:
              - link "Undo changes" [ref=e556]:
                - /url: "#undo-changes"
            - paragraph [ref=e557]: Let’s say you ask OpenCode to make some changes.
            - figure [ref=e559]:
              - region [ref=e560]:
                - code [ref=e561]:
                  - generic [ref=e563]:
                    - text: Can you refactor the function in
                    - mark [ref=e564]: "@packages/functions/src/api/index.ts"
                    - text: "?"
              - button "Copy to clipboard" [ref=e566] [cursor=pointer]
            - paragraph [ref=e568]:
              - text: But you realize that it is not what you wanted. You
              - strong [ref=e569]: can undo
              - text: the changes using the
              - code [ref=e570]: "`/undo`"
              - text: command.
            - figure [ref=e572]:
              - code [ref=e574]:
                - generic [ref=e576]: /undo
              - button "Copy to clipboard" [ref=e578] [cursor=pointer]
            - paragraph [ref=e580]: OpenCode will now revert the changes you made and show your original message again.
            - figure [ref=e582]:
              - region [ref=e583]:
                - code [ref=e584]:
                  - generic [ref=e586]:
                    - text: Can you refactor the function in
                    - mark [ref=e587]: "@packages/functions/src/api/index.ts"
                    - text: "?"
              - button "Copy to clipboard" [ref=e589] [cursor=pointer]
            - paragraph [ref=e591]: From here you can tweak the prompt and ask OpenCode to try again.
            - complementary "Tip" [ref=e592]:
              - paragraph [ref=e593]:
                - img [ref=e594]
                - text: Tip
              - paragraph [ref=e598]:
                - text: You can run
                - code [ref=e599]: "`/undo`"
                - text: multiple times to undo multiple changes.
            - paragraph [ref=e600]:
              - text: Or you
              - strong [ref=e601]: can redo
              - text: the changes using the
              - code [ref=e602]: "`/redo`"
              - text: command.
            - figure [ref=e604]:
