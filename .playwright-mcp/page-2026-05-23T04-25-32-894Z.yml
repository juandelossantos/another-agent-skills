      - main [ref=e125]:
        - generic [ref=e127]:
          - heading "Agent Skills" [level=1] [ref=e128]
          - paragraph [ref=e129]: Define reusable behavior via SKILL.md definitions
        - generic [ref=e131]:
          - generic [ref=e132]:
            - paragraph [ref=e133]:
              - text: Agent skills let OpenCode discover reusable instructions from your repo or home directory. Skills are loaded on-demand via the native
              - code [ref=e134]: "`skill`"
              - text: tool—agents see available skills and can load the full content when needed.
            - separator [ref=e135]
            - heading "Place files" [level=2] [ref=e136]:
              - link "Place files" [ref=e137]:
                - /url: "#place-files"
            - paragraph [ref=e138]:
              - text: Create one folder per skill name and put a
              - code [ref=e139]: "`SKILL.md`"
              - text: "inside it. OpenCode searches these locations:"
            - list [ref=e140]:
              - listitem [ref=e141]:
                - text: "Project config:"
                - code [ref=e142]: "`.opencode/skills/<name>/SKILL.md`"
              - listitem [ref=e143]:
                - text: "Global config:"
                - code [ref=e144]: "`~/.config/opencode/skills/<name>/SKILL.md`"
              - listitem [ref=e145]:
                - text: "Project Claude-compatible:"
                - code [ref=e146]: "`.claude/skills/<name>/SKILL.md`"
              - listitem [ref=e147]:
                - text: "Global Claude-compatible:"
                - code [ref=e148]: "`~/.claude/skills/<name>/SKILL.md`"
              - listitem [ref=e149]:
                - text: "Project agent-compatible:"
                - code [ref=e150]: "`.agents/skills/<name>/SKILL.md`"
              - listitem [ref=e151]:
                - text: "Global agent-compatible:"
                - code [ref=e152]: "`~/.agents/skills/<name>/SKILL.md`"
            - separator [ref=e153]
            - heading "Understand discovery" [level=2] [ref=e154]:
              - link "Understand discovery" [ref=e155]:
                - /url: "#understand-discovery"
            - paragraph [ref=e156]:
              - text: For project-local paths, OpenCode walks up from your current working directory until it reaches the git worktree. It loads any matching
              - code [ref=e157]: "`skills/*/SKILL.md`"
              - text: in
              - code [ref=e158]: "`.opencode/`"
              - text: and any matching
              - code [ref=e159]: "`.claude/skills/*/SKILL.md`"
              - text: or
              - code [ref=e160]: "`.agents/skills/*/SKILL.md`"
              - text: along the way.
            - paragraph [ref=e161]:
              - text: Global definitions are also loaded from
              - code [ref=e162]: "`~/.config/opencode/skills/*/SKILL.md`"
              - text: ","
              - code [ref=e163]: "`~/.claude/skills/*/SKILL.md`"
              - text: ", and"
              - code [ref=e164]: "`~/.agents/skills/*/SKILL.md`"
              - text: .
            - separator [ref=e165]
            - heading "Write frontmatter" [level=2] [ref=e166]:
              - link "Write frontmatter" [ref=e167]:
                - /url: "#write-frontmatter"
            - paragraph [ref=e168]:
              - text: Each
              - code [ref=e169]: "`SKILL.md`"
              - text: "must start with YAML frontmatter. Only these fields are recognized:"
            - list [ref=e170]:
              - listitem [ref=e171]:
                - code [ref=e172]: "`name`"
                - text: (required)
              - listitem [ref=e173]:
                - code [ref=e174]: "`description`"
                - text: (required)
              - listitem [ref=e175]:
                - code [ref=e176]: "`license`"
                - text: (optional)
              - listitem [ref=e177]:
                - code [ref=e178]: "`compatibility`"
                - text: (optional)
              - listitem [ref=e179]:
                - code [ref=e180]: "`metadata`"
                - text: (optional, string-to-string map)
            - paragraph [ref=e181]: Unknown frontmatter fields are ignored.
            - separator [ref=e182]
            - heading "Validate names" [level=2] [ref=e183]:
              - link "Validate names" [ref=e184]:
                - /url: "#validate-names"
            - paragraph [ref=e185]:
              - code [ref=e186]: "`name`"
              - text: "must:"
            - list [ref=e187]:
              - listitem [ref=e188]: Be 1–64 characters
              - listitem [ref=e189]: Be lowercase alphanumeric with single hyphen separators
              - listitem [ref=e190]:
                - text: Not start or end with
                - code [ref=e191]: "`-`"
              - listitem [ref=e192]:
                - text: Not contain consecutive
                - code [ref=e193]: "`--`"
              - listitem [ref=e194]:
                - text: Match the directory name that contains
                - code [ref=e195]: "`SKILL.md`"
            - paragraph [ref=e196]: "Equivalent regex:"
            - figure [ref=e198]:
              - code [ref=e200]:
                - generic [ref=e202]: ^[a-z0-9]+(-[a-z0-9]+)*$
              - button "Copy to clipboard" [ref=e204] [cursor=pointer]
            - separator [ref=e206]
            - heading "Follow length rules" [level=2] [ref=e207]:
              - link "Follow length rules" [ref=e208]:
                - /url: "#follow-length-rules"
            - paragraph [ref=e209]:
              - code [ref=e210]: "`description`"
              - text: must be 1-1024 characters. Keep it specific enough for the agent to choose correctly.
            - separator [ref=e211]
            - heading "Use an example" [level=2] [ref=e212]:
              - link "Use an example" [ref=e213]:
                - /url: "#use-an-example"
            - paragraph [ref=e214]:
              - text: Create
              - code [ref=e215]: "`.opencode/skills/git-release/SKILL.md`"
              - text: "like this:"
            - figure [ref=e217]:
              - code [ref=e219]:
                - generic [ref=e221]: "---"
                - generic [ref=e223]: "name: git-release"
                - generic [ref=e225]: "description: Create consistent releases and changelogs"
                - generic [ref=e227]: "license: MIT"
                - generic [ref=e229]: "compatibility: opencode"
                - generic [ref=e231]: "metadata:"
                - generic [ref=e233]: "audience: maintainers"
                - generic [ref=e235]: "workflow: github"
                - generic [ref=e237]: "---"
                - generic [ref=e241]: "## What I do"
                - generic [ref=e245]: "- Draft release notes from merged PRs"
                - generic [ref=e247]: "- Propose a version bump"
                - generic [ref=e249]: "- Provide a copy-pasteable `gh release create` command"
                - generic [ref=e253]: "## When to use me"
                - generic [ref=e257]: Use this when you are preparing a tagged release.
                - generic [ref=e259]: Ask clarifying questions if the target versioning scheme is unclear.
              - button "Copy to clipboard" [ref=e261] [cursor=pointer]
            - separator [ref=e263]
            - heading "Recognize tool description" [level=2] [ref=e264]:
              - link "Recognize tool description" [ref=e265]:
                - /url: "#recognize-tool-description"
            - paragraph [ref=e266]:
              - text: OpenCode lists available skills in the
              - code [ref=e267]: "`skill`"
              - text: "tool description. Each entry includes the skill name and description:"
            - figure [ref=e269]:
              - code [ref=e271]:
                - generic [ref=e273]: <available_skills>
                - generic [ref=e275]: <skill>
                - generic [ref=e278]: <name>git-release</name>
                - generic [ref=e281]: <description>Create consistent releases and changelogs</description>
                - generic [ref=e284]: </skill>
                - generic [ref=e287]: </available_skills>
              - button "Copy to clipboard" [ref=e289] [cursor=pointer]
            - paragraph [ref=e291]: "The agent loads a skill by calling the tool:"
            - figure [ref=e293]:
              - code [ref=e295]:
                - generic [ref=e297]: "skill({ name: \"git-release\" })"
              - button "Copy to clipboard" [ref=e299] [cursor=pointer]
            - separator [ref=e301]
            - heading "Configure permissions" [level=2] [ref=e302]:
              - link "Configure permissions" [ref=e303]:
                - /url: "#configure-permissions"
            - paragraph [ref=e304]:
              - text: Control which skills agents can access using pattern-based permissions in
              - code [ref=e305]: "`opencode.json`"
              - text: ":"
            - figure [ref=e307]:
              - code [ref=e309]:
                - generic [ref=e311]: "{"
                - generic [ref=e313]: "\"permission\": {"
                - generic [ref=e315]: "\"skill\": {"
                - generic [ref=e317]: "\"*\": \"allow\","
                - generic [ref=e319]: "\"pr-review\": \"allow\","
                - generic [ref=e321]: "\"internal-*\": \"deny\","
                - generic [ref=e323]: "\"experimental-*\": \"ask\""
                - generic [ref=e325]: "}"
                - generic [ref=e328]: "}"
                - generic [ref=e331]: "}"
              - button "Copy to clipboard" [ref=e333] [cursor=pointer]
            - table [ref=e335]:
              - rowgroup [ref=e336]:
                - row "Permission Behavior" [ref=e337]:
                  - columnheader "Permission" [ref=e338]
                  - columnheader "Behavior" [ref=e339]
              - rowgroup [ref=e340]:
                - 'row "`allow` Skill loads immediately" [ref=e341]':
                  - 'cell "`allow`" [ref=e342]':
                    - code [ref=e343]: "`allow`"
                  - cell "Skill loads immediately" [ref=e344]
                - 'row "`deny` Skill hidden from agent, access rejected" [ref=e345]':
                  - 'cell "`deny`" [ref=e346]':
                    - code [ref=e347]: "`deny`"
                  - cell "Skill hidden from agent, access rejected" [ref=e348]
                - 'row "`ask` User prompted for approval before loading" [ref=e349]':
                  - 'cell "`ask`" [ref=e350]':
                    - code [ref=e351]: "`ask`"
                  - cell "User prompted for approval before loading" [ref=e352]
            - paragraph [ref=e353]:
              - text: "Patterns support wildcards:"
              - code [ref=e354]: "`internal-*`"
              - text: matches
              - code [ref=e355]: "`internal-docs`"
              - text: ","
              - code [ref=e356]: "`internal-tools`"
              - text: ", etc."
            - separator [ref=e357]
            - heading "Override per agent" [level=2] [ref=e358]:
              - link "Override per agent" [ref=e359]:
                - /url: "#override-per-agent"
            - paragraph [ref=e360]: Give specific agents different permissions than the global defaults.
            - paragraph [ref=e361]:
              - strong [ref=e362]: For custom agents
              - text: "(in agent frontmatter):"
            - figure [ref=e364]:
              - code [ref=e366]:
                - generic [ref=e368]: "---"
                - generic [ref=e370]: "permission:"
                - generic [ref=e372]: "skill:"
                - generic [ref=e374]: "\"documents-*\": \"allow\""
