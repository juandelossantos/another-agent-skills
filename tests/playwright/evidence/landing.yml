            - generic [ref=f6e174]: "01"
            - paragraph [ref=f6e175]: Quality emerges from explicit contracts, not implicit trust.
          - listitem [ref=f6e176]:
            - generic [ref=f6e177]: "02"
            - paragraph [ref=f6e178]: Rules that depend on memory fail. Rules that depend on visible blocks succeed.
          - listitem [ref=f6e179]:
            - generic [ref=f6e180]: "03"
            - paragraph [ref=f6e181]: A hook that accepts any token is a suggestion. A hook that verifies integrity is a gate.
          - listitem [ref=f6e182]:
            - generic [ref=f6e183]: "04"
            - paragraph [ref=f6e184]: Speed is a side effect of precision, never the primary goal.
          - listitem [ref=f6e185]:
            - generic [ref=f6e186]: "05"
